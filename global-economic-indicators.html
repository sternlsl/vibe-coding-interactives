<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economic Indicators Dashboard</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-slate-50">
<div id="root"></div>

<script type="text/babel">
  // Access hooks from React global
  const { useState } = React;

  // Mock Lucide Icons since the UMD version works differently than imports
  // This maps the icons used in your code to the Lucide library
  const TrendingUp = (props) => <i data-lucide="trending-up" {...props}></i>;
  const Tag = (props) => <i data-lucide="tag" {...props}></i>;
  const User = (props) => <i data-lucide="user" {...props}></i>;
  const Database = (props) => <i data-lucide="database" {...props}></i>;
  const ChevronDown = (props) => <i data-lucide="chevron-down" {...props}></i>;
  const Columns = (props) => <i data-lucide="columns" {...props}></i>;
  const CheckCircle2 = (props) => <i data-lucide="check-circle-2" {...props}></i>;

  const countryData = {
    "Singapore": { gdpGrowth: 4.4, inflation: 2.4, unemployment: 2.7, gdp: 547.39, perCapitaGdp: 90674 },
    "United States": { gdpGrowth: 2.8, inflation: 2.9, unemployment: 4.0, gdp: 28751, perCapitaGdp: 84534 },
    "China": { gdpGrowth: 5.0, inflation: 0.2, unemployment: 4.6, gdp: 18743, perCapitaGdp: 13303 },
    "India": { gdpGrowth: 6.5, inflation: 5.0, unemployment: 4.2, gdp: 3910, perCapitaGdp: 2695 },
    "Germany": { gdpGrowth: -0.5, inflation: 2.3, unemployment: 3.4, gdp: 4686, perCapitaGdp: 56104 },
    "Japan": { gdpGrowth: 0.1, inflation: 2.7, unemployment: 2.5, gdp: 4027, perCapitaGdp: 32487 },
    "United Kingdom": { gdpGrowth: 1.1, inflation: 3.3, unemployment: 4.4, gdp: 3686, perCapitaGdp: 53264 },
    "France": { gdpGrowth: 1.2, inflation: 2.0, unemployment: 7.4, gdp: 3160, perCapitaGdp: 46103 },
    "Brazil": { gdpGrowth: 3.4, inflation: 4.4, unemployment: 6.8, gdp: 2185, perCapitaGdp: 10311 },
    "Canada": { gdpGrowth: 1.6, inflation: 2.4, unemployment: 6.4, gdp: 2244, perCapitaGdp: 54340 },
    "Australia": { gdpGrowth: 1.4, inflation: 3.2, unemployment: 3.9, gdp: 1757, perCapitaGdp: 64604 },
    "South Korea": { gdpGrowth: 2.0, inflation: 2.3, unemployment: 2.8, gdp: 1875, perCapitaGdp: 36238 },
    "Italy": { gdpGrowth: 0.7, inflation: 1.0, unemployment: 6.5, gdp: 2381, perCapitaGdp: 40385 }
  };

  const formatValue = (key, val) => {
    if (key === 'gdpGrowth' || key === 'inflation' || key === 'unemployment') return `${val.toFixed(1)}%`;
    if (key === 'gdp') return val >= 1000 ? `$${(val / 1000).toFixed(2)} T` : `$${val.toFixed(2)} B`;
    if (key === 'perCapitaGdp') return `$${val.toLocaleString()}`;
    return val;
  };

  const ComparisonRow = ({ label, icon: Icon, val1, val2, isComparing, field }) => {
    const isBetter = (v1, v2) => {
      if (field === 'inflation' || field === 'unemployment') return v1 < v2;
      return v1 > v2;
    };
    const v1IsBetter = isComparing && isBetter(val1, val2);
    const v2IsBetter = isComparing && isBetter(val2, val1);

    return (
            <div className="bg-white border-b last:border-b-0 border-purple-100 p-4 md:p-6 transition-colors hover:bg-slate-50">
              <div className="flex flex-col md:flex-row md:items-center">
                <div className="flex items-center gap-3 mb-4 md:mb-0 md:w-1/4">
                  <div className="bg-purple-100 p-2 rounded-lg shrink-0"><Icon className="w-4 h-4 text-purple-700" /></div>
                  <span className="font-semibold text-purple-900 text-xs md:text-sm tracking-tight">{label}</span>
                </div>
                <div className={`grid ${isComparing ? 'grid-cols-2' : 'grid-cols-1'} flex-grow gap-4 md:gap-8`}>
                  <div className={`flex flex-col items-center justify-center p-4 rounded-2xl transition-all ${v1IsBetter ? 'bg-green-50 ring-1 ring-green-200' : ''}`}>
                    {v1IsBetter && <span className="text-[10px] font-bold text-green-600 mb-1 flex items-center gap-1"><CheckCircle2 className="w-3 h-3" /> Leading</span>}
                    <span className={`text-2xl md:text-3xl font-black ${v1IsBetter ? 'text-green-700' : 'text-purple-900'}`}>{formatValue(field, val1)}</span>
                  </div>
                  {isComparing && (
                          <div className={`flex flex-col items-center justify-center p-4 rounded-2xl transition-all border-l md:border-l-0 border-purple-100 ${v2IsBetter ? 'bg-green-50 ring-1 ring-green-200' : ''}`}>
                            {v2IsBetter && <span className="text-[10px] font-bold text-green-600 mb-1 flex items-center gap-1"><CheckCircle2 className="w-3 h-3" /> Leading</span>}
                            <span className={`text-2xl md:text-3xl font-black ${v2IsBetter ? 'text-green-700' : 'text-purple-700'}`}>{formatValue(field, val2)}</span>
                          </div>
                  )}
                </div>
              </div>
            </div>
    );
  };

  const StatCard = ({ title, value, subtext, icon: Icon, field }) => (
          <div className="bg-white border-2 border-purple-100 rounded-3xl p-6 flex flex-col items-center text-center shadow-sm hover:shadow-md transition-shadow h-full">
            <h3 className="text-purple-900 font-bold text-xs mb-4 uppercase tracking-wider">{title}</h3>
            <div className="bg-purple-50 p-4 rounded-full mb-6"><Icon className="w-8 h-8 text-purple-700" /></div>
            <div className="mt-auto">
              <p className="text-3xl font-black text-purple-900 mb-1 leading-tight">{formatValue(field, value)}</p>
              <p className="text-slate-400 text-[10px] font-bold uppercase tracking-tight">{subtext}</p>
            </div>
          </div>
  );

  function App() {
    const [selectedCountry1, setSelectedCountry1] = useState("Singapore");
    const [selectedCountry2, setSelectedCountry2] = useState("United States");
    const [isComparing, setIsComparing] = useState(false);

    // Effect to trigger Lucide icons after rendering
    React.useEffect(() => { lucide.createIcons(); });

    const data1 = countryData[selectedCountry1];
    const data2 = countryData[selectedCountry2];
    const sortedCountryNames = Object.keys(countryData).sort();

    return (
            <div className="min-h-screen bg-slate-50 font-sans p-4 md:p-8 lg:p-12 text-slate-900">
              <div className="max-w-6xl mx-auto">
                <div className="bg-white rounded-[2.5rem] shadow-sm border-2 border-purple-50 p-6 md:p-8 mb-8">
                  <div className="flex flex-col lg:flex-row lg:items-center justify-between gap-8">
                    <div className="flex items-center gap-5">
                      <div className="p-4 bg-purple-900 rounded-2xl text-white shadow-lg shadow-purple-200"><TrendingUp className="w-7 h-7" /></div>
                      <div>
                        <h1 className="text-2xl md:text-3xl font-black text-purple-950 tracking-tight leading-none">Economic Indicators <span className="text-purple-400 font-light">2024</span></h1>
                        <p className="text-xs text-slate-400 font-semibold mt-2 uppercase tracking-widest">Global Market Intelligence</p>
                      </div>
                    </div>
                    <div className="flex flex-wrap items-center gap-3">
                      <button onClick={() => setIsComparing(!isComparing)} className={`flex items-center gap-2 px-6 py-3 rounded-2xl font-bold text-sm transition-all active:scale-95 shadow-sm ${isComparing ? 'bg-purple-900 text-white' : 'bg-white border-2 border-purple-100 text-purple-800 hover:bg-purple-50'}`}>
                        <Columns className="w-4 h-4" /> {isComparing ? "Dashboard View" : "Compare Nations"}
                      </button>
                      <div className="flex items-center gap-2 bg-slate-100 p-1.5 rounded-2xl border border-slate-200">
                        <select value={selectedCountry1} onChange={(e) => setSelectedCountry1(e.target.value)} className="bg-white border border-slate-200 text-purple-950 font-bold py-2 px-4 rounded-xl cursor-pointer text-sm shadow-sm">
                          {sortedCountryNames.map(c => <option key={c} value={c}>{c}</option>)}
                        </select>
                        {isComparing && (
                                <div className="flex items-center gap-2">
                                  <span className="text-slate-400 font-black text-xs px-1">VS</span>
                                  <select value={selectedCountry2} onChange={(e) => setSelectedCountry2(e.target.value)} className="bg-purple-800 text-white font-bold py-2 px-4 rounded-xl cursor-pointer text-sm shadow-sm">
                                    {sortedCountryNames.map(c => <option key={c} value={c}>{c}</option>)}
                                  </select>
                                </div>
                        )}
                      </div>
                    </div>
                  </div>
                </div>

                {!isComparing ? (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
                          <StatCard title="GDP Growth" value={data1.gdpGrowth} subtext="Annual Real GDP" icon={TrendingUp} field="gdpGrowth" />
                          <StatCard title="Inflation" value={data1.inflation} subtext="Consumer Price Index" icon={Tag} field="inflation" />
                          <StatCard title="Unemployment" value={data1.unemployment} subtext="Current Jobless Rate" icon={User} field="unemployment" />
                          <StatCard title="Total GDP" value={data1.gdp} subtext="Current USD (Nominal)" icon={Database} field="gdp" />
                          <StatCard title="GDP Per Capita" value={data1.perCapitaGdp} subtext="Wealth Per Person" icon={User} field="perCapitaGdp" />
                        </div>
                ) : (
                        <div className="bg-white rounded-[2.5rem] overflow-hidden border-2 border-purple-100 shadow-2xl">
                          <div className="bg-purple-900 px-8 py-5 text-white">
                            <div className="flex items-center text-center">
                              <div className="hidden md:block md:w-1/4"></div>
                              <div className="grid grid-cols-2 flex-grow font-black text-sm uppercase tracking-widest">
                                <div className="px-4">{selectedCountry1}</div>
                                <div className="px-4 border-l border-purple-700/50">{selectedCountry2}</div>
                              </div>
                            </div>
                          </div>
                          <div className="divide-y divide-purple-50">
                            <ComparisonRow label="GDP Growth" icon={TrendingUp} val1={data1.gdpGrowth} val2={data2.gdpGrowth} isComparing={true} field="gdpGrowth" />
                            <ComparisonRow label="Inflation Rate" icon={Tag} val1={data1.inflation} val2={data2.inflation} isComparing={true} field="inflation" />
                            <ComparisonRow label="Unemployment" icon={User} val1={data1.unemployment} val2={data2.unemployment} isComparing={true} field="unemployment" />
                            <ComparisonRow label="Total GDP" icon={Database} val1={data1.gdp} val2={data2.gdp} isComparing={true} field="gdp" />
                            <ComparisonRow label="GDP Per Capita" icon={User} val1={data1.perCapitaGdp} val2={data2.perCapitaGdp} isComparing={true} field="perCapitaGdp" />
                          </div>
                        </div>
                )}
                <div className="mt-12 text-center">
                  <div className="inline-block px-8 py-4 rounded-full bg-slate-200/50 border border-slate-200">
                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest leading-relaxed">Data: World Bank Open Data & IMF WEO (2024 Projections).</p>
                  </div>
                </div>
              </div>
            </div>
    );
  }

  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<App />);
</script>
</body>
</html>
